<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSE 24 Batch</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html {
    scroll-behavior: smooth;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    background: #0b0b0f;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a2e, #0b0b0f);
    text-align: center;
    position: relative;
}

.hero h1 {
    font-size: 60px;
}

.hero span {
    color: #6c63ff;
}

.hero p {
    margin-top: 20px;
    color: #aaa;
}

.hero button {
    margin-top: 30px;
    padding: 14px 28px;
    border-radius: 12px;
    border: none;
    background: #6c63ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    transform: scale(1.05);
}

/* FB ICON TOP RIGHT */
.fb-icon {
    position: absolute;
    top: 25px;
    right: 25px;

    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 50%;
    background: #111;
    border: 1px solid #333;

    color: #1877f2;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

.fb-icon:hover {
    background: #1877f2;
    color: white;
    transform: scale(1.1);
}

/* ALUMNI */
.alumni {
    padding: 80px 60px;
}

.alumni h2 {
    font-size: 32px;
    margin-bottom: 10px;
}

.subtitle {
    color: #aaa;
    margin-bottom: 25px;
}

.search-bar {
    margin-bottom: 30px;
}

.search-bar input {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #111;
    color: white;
    width: 300px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: linear-gradient(145deg, #121212, #0d0d0d);
    border: 1px solid #222;
    padding: 20px;
    border-radius: 16px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    border-color: #6c63ff;
}

/* AVATAR */
.avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 15px;
    border: 2px solid #333;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXT */
.name {
    font-size: 18px;
    font-weight: 600;
}

.role {
    color: #aaa;
    font-size: 14px;
    margin: 8px 0;
}

.tag {
    background: #1a1a1a;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    border: 1px solid #333;
    display: inline-block;
    margin-bottom: 10px;
}

/* SOCIAL */
.socials {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

/* base style */
.socials a,
.socials button {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #111;
    border: 1px solid #333;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
}

/* FIXED HOVER SYSTEM */
.socials a.fb:hover {
    background: #1877f2;
    color: white;
    transform: scale(1.1);
}

.socials a.linkedin:hover {
    background: #0077b5;
    color: white;
    transform: scale(1.1);
}

.socials button:hover {
    background: #28a745;
    color: white;
    transform: scale(1.1);
}
.typewriter {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    border-right: .15em solid #6c63ff;
    animation: typing 2.5s steps(20, end), blink .75s step-end infinite;
    width: 0;
}

/* typing */
@keyframes typing {
    from { width: 0 }
    to { width: 13ch; } /* FIX: stops exactly at text length */
}

/* cursor blink */
@keyframes blink {
    50% { border-color: transparent; }
}
</style>
</head>

<script>
function copyPhone(number) {
    navigator.clipboard.writeText(number).then(() => {
        alert("Phone number copied: " + number);
    }).catch(() => {
        alert("Failed to copy");
    });
}
</script>

<body>

<!-- HERO -->
<section class="hero">

    <a href="https://www.facebook.com/YOUR_BATCH_PAGE" target="_blank" class="fb-icon">
        <i class="fab fa-facebook-f"></i>
    </a>

    <h1 class="typewriter">Welcome to <span>CSE 24</span></h1>
    <p>The future engineers, coders, and innovators.</p>

    <a href="#alumni">
        <button>Explore the Batch ↓</button>
    </a>

</section>

<!-- ALUMNI -->
<section id="alumni" class="alumni">

    <h2>Batch Directory</h2>
    <p class="subtitle">Meet the members of CSE 24.</p>

    <div class="search-bar">
        <input type="text" placeholder="Search by name...">
    </div>

    <div class="grid">

        <div class="card">
            <div class="avatar">
                <img src="images/miraz.jpg" alt="Miraz">
            </div>

            <div class="name">Miraz Morshed</div>
            <div class="role">Competitive Programmer</div>
            <div class="tag">SEC B</div>

            <div class="socials">
                <a href="https://facebook.com/miraz3301" class="fb" target="_blank">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="https://linkedin.com/in/miraz3301" class="linkedin" target="_blank">
                    <i class="fab fa-linkedin-in"></i>
                </a>

                <button onclick="copyPhone('+880123456789')">
                    <i class="fas fa-phone"></i>
                </button>
            </div>
        </div>

    </div>
</section>

<script>
const searchInput = document.querySelector(".search-bar input");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("input", function () {
    const value = this.value.toLowerCase();

    cards.forEach(card => {
        const name = card.querySelector(".name").textContent.toLowerCase();
        card.style.display = name.includes(value) ? "block" : "none";
    });
});
</script>

</body>
</html>
